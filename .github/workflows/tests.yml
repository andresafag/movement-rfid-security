name: Tests

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  host-unit:
    name: 🧪 Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # -------------------------------------------------
      # 0️⃣ Checkout
      # -------------------------------------------------
      - name: 📥 Check out
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # -------------------------------------------------
      # 6️⃣ Run tests
      # -------------------------------------------------
      - name: Build ESP-IDF Project
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: 'v6.0.2'      
          target: 'esp32'             
          path: '.'                   

      # -------------------------------------------------
      # 7️⃣ Upload logs
      # -------------------------------------------------
      - name: 📤 Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-unit-logs
          path: ./**/*.log
          if-no-files-found: ignore
          retention-days: 7


  # =========================================================================
  # 2. ESP-IDF component tests — real RTOS + GPIO driver in QEMU.
  # =========================================================================
  esp-component:
    name: 🧪 ESP-IDF component tests (QEMU)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash -l {0}
			
    steps:
      - name: 📥 Check out
        uses: actions/checkout@v4
      
      - name: 🔍 Verificar caché del paso pesado
        id: cache
        uses: actions/cache@v4
        with:      # Cachamos la carpeta donde el action instala el IDF y las herramientas (.espressif)
          path: |
            ~/.espressif
            ~/opt/esp
          key: ${{ runner.os }}-esp-idf-v6.0.2-qemu

      - name: 🛠️ Install ESP-IDF & QEMU Tools
        uses: espressif/install-esp-idf-action@v1
        with:
          version: 'v6.0.2' 
          with_qemu: true

      - name: 🏗️ Build ESP-IDF Project
        run: |
          idf.py set-target esp32
          idf.py build

      - name: 🚀 Run Application in QEMU Emulator
        run: |
          echo "Starting ESP32 QEMU Simulation..."
          
          # 'install-esp-idf-action' ya exporta el entorno, no necesitas '. export.sh'
          # Ejecutamos idf.py qemu en segundo plano
          idf.py qemu --non-interactive monitor > qemu_output.log 2>&1 &
          QEMU_PID=$!
          
          # Dar tiempo a la simulación
          sleep 15
          
          # Terminar QEMU limpiamente
          kill $QEMU_PID || true
          
          echo "=== QEMU EXECUTION LOGS ==="
          cat qemu_output.log
          
          # Validaciones de fallos comunes en ESP32
          if grep -q "Guru Meditation Error" qemu_output.log; then
            echo "❌ Test Failed: Core panic detected!"
            exit 1
          fi

          if grep -q "Backtrace:" qemu_output.log; then
            echo "❌ Test Failed: App crashed with a backtrace!"
            exit 1
          fi
          
          echo "✅ Test Passed: App successfully executed in QEMU!"

      - name: 📤 Upload component test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: esp-component-logs
          path: tests/component/movement_driver/build/*.log
          if-no-files-found: ignore
          retention-days: 7


