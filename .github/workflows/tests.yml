name: Tests

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  host-unit:
    name: 🧪 Host unit tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      # -------------------------------------------------
      # 0️⃣ Checkout
      # -------------------------------------------------
      - name: 📥 Check out
        uses: actions/checkout@v4

      # -------------------------------------------------
      # 1️⃣ Install dependencies (Ubuntu)
      # -------------------------------------------------
      - name: 🛠️ Install Ubuntu deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang-format \
            check \
            cppcheck \
            pkg-config \
            cmake

      # -------------------------------------------------
      # 2️⃣ Install dependencies (Windows – vcpkg + Check + pkgconf)
      # -------------------------------------------------
      - name: 🛠️ Install Windows deps (vcpkg + Check + pkgconf)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # ---- Bootstrap vcpkg (once per runner) ----
          $vcpkgRoot = "$env:USERPROFILE\vcpkg"
          if (-not (Test-Path "$vcpkgRoot\bootstrap.vcpkg.exe")) {
            Write-Host "Cloning vcpkg..."
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
            Write-Host "Bootstrapping vcpkg..."
            & "$vcpkgRoot\bootstrap-vcpkg.bat"
          } else {
            Write-Host "vcpkg already bootstrapped at $vcpkgRoot"
          }

          # ---- Install Check and pkgconf (static libs) for x64-windows ----
          Write-Host "Installing Check and pkgconf via vcpkg..."
          & "$vcpkgRoot\vcpkg.exe" install check:x64-windows pkgconf:x64-windows

          # ---- Verify that the toolchain file exists (just a safety check) ----
          $toolchain = Join-Path $vcpkgRoot 'scripts/buildsystems/vcpkg.cmake'
          if (-not (Test-Path $toolchain)) {
            Write-Error "❌ vcpkg toolchain file not found at $toolchain"
            exit 1
          }

          # ---- Integrate installed packages so that find_package works without an explicit toolchain file ----
          Write-Host "Integrating vcpkg packages..."
          & "$vcpkgRoot\vcpkg.exe" integrate install

      # -------------------------------------------------
      # 3️⃣ (Ubuntu only) clang-format & cppcheck
      # -------------------------------------------------
      - name: 🧹 clang-format check Ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: |
          find components main tests/host \( -name '*.c' -o -name '*.h' \) -exec clang-format -i {} +

      - name: 🧹 clang-format check Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # No extra action needed – vcpkg already installed Check above.
          # Keep this step if you want to run clang‑format on Windows as well.

      - name: 🐛 cppcheck
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y -qq cppcheck
          cppcheck --enable=warning,style,performance \
                   --error-exitcode=1 --inline-suppr --quiet \
                   --suppress=missingIncludeSystem \
                   components main

      # -------------------------------------------------
      # 4️⃣ Configure CMake
      # -------------------------------------------------
      - name: 🛠️ Configure CMake (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cmake -S tests/host -B tests/host/build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-Wno-unknown-warning-option"   # silence harmless -pthread warning on GCC/Clang

      - name: 🛠️ Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $vcpkgRoot = "$env:USERPROFILE\vcpkg"
          $pkgConfigExe = Join-Path $vcpkgRoot 'installed' 'x64-windows' 'tools' 'pkgconf' 'pkgconf.exe'
          
          if (-not (Test-Path $pkgConfigExe)) {
            Write-Error "❌ pkgconf.exe not found at $pkgConfigExe"
            exit 1
          }
          
          Write-Host "Using pkgconf at: $pkgConfigExe"
          
          $cmakeArgs = @(
              "-S", "tests/host"
              "-B", "tests/host/build"
              "-G", "Visual Studio 18 2026"
              "-DCMAKE_BUILD_TYPE=Debug"
              "-DCMAKE_C_FLAGS=/wd4005"
              "-DPKG_CONFIG_EXECUTABLE=$pkgConfigExe"
          )
          
          cmake @cmakeArgs

      # -------------------------------------------------
      # 5️⃣ Build tests
      # -------------------------------------------------
      - name: 🏗️ Build tests (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: cmake --build tests/host/build --config Debug -j 2

      - name: 🏗️ Build tests (Windows)
        if: matrix.os == 'windows-latest'
        # Using forward slashes to avoid YAML escaping issues
        env:
          LIB: "${{ env.USERPROFILE }}/vcpkg/installed/x64-windows/lib;${{ env.LIB }}"
        run: cmake --build tests/host/build --config Debug -j 2
        

      - name: Analyze Pipeline Failure with AI
        if: failure() && github.event_name == 'pull_request'
        env:
          OPENAI_API_KEY: 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
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching recent workflow logs..."
          
          # 1. Download the current run logs using the GitHub CLI
          gh run view ${{ github.run_id }} --log-failed > failed_logs.txt
          
          # 2. Truncate logs if they are too long (keep the last 200 lines to avoid token limits)
          tail -n 200 failed_logs.txt > optimized_logs.txt
          
          # 3. Create the prompt for the AI
          cat << 'EOF' > prompt.json
          {
            "contents": [{
              "parts": [{
                "text": "You are a DevOps expert. Analyze these GitHub Actions failure logs. Identify exactly why the build failed and provide the precise code or configuration fix needed to resolve it. Keep your answer concise and format code snippets clearly.\n\nLOGS:\n"
              }]
            }]
          }
          EOF
          
          # Escape the logs to safely embed them into the JSON payload
          ESCAPED_LOGS=$(jq -Rs '.' optimized_logs.txt)
          jq --argjson logs "$ESCAPED_LOGS" '.contents[0].parts[0].text += $logs' prompt.json > payload.json
          
          echo "Querying Gemini API for a correction..."
          
          # 4. Call the free Gemini API
          RESPONSE=$(curl -s -X POST \
            "https://googleapis.com{GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @payload.json)
          
          # Extract the text markdown response
          AI_ANALYSIS=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "AI could not generate a response. Please check API limits."')
          
          # 5. Format the markdown comment for the Pull Request
          COMMENT_BODY=$(cat << EOF
          ## 🤖 AI Pipeline Correction Analysis
          The pipeline failed. Here is the automated diagnostic:
          
          $AI_ANALYSIS
          EOF
          )
          
          # 6. Post the comment directly to the Pull Request using GitHub CLI
          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT_BODY"

      # -------------------------------------------------
      # 6️⃣ Run tests
      # -------------------------------------------------
      - name: ▶️ Run ctest
        working-directory: tests/host/build
        run: ctest --output-on-failure --verbose

      # -------------------------------------------------
      # 7️⃣ Upload logs
      # -------------------------------------------------
      - name: 📤 Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-unit-logs-${{ matrix.os }}
          path: tests/host/build/Testing/**/*.log
          if-no-files-found: ignore
          retention-days: 7


  # =========================================================================
  # 2. ESP-IDF component tests — real RTOS + GPIO driver in QEMU.
  # =========================================================================
  esp-component:
    name: 🧪 ESP-IDF component tests (QEMU)
    needs: host-unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Check out
        uses: actions/checkout@v4

      - name: 🛠️ Install ESP-IDF v5.2
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2
          target: esp32

      - name: 📦 Install QEMU
        run: sudo apt-get install -y -qq qemu-system-xtensa

      - name: 🧹 Reset component lockfile
        run: rm -f dependencies.lock

      - name: 🏗️ Build component test
        working-directory: tests/component/movement_driver
        run: idf.py build

      - name: ▶️ Run component test (QEMU)
        working-directory: tests/component/movement_driver
        run: |
          timeout 120 qemu-system-xtensa \
            -nographic \
            -machine esp32 \
            -drive file=build/movement_driver_component_test.bin,if=mtd,format=raw \
            || true

      - name: 📤 Upload component test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: esp-component-logs
          path: tests/component/movement_driver/build/*.log
          if-no-files-found: ignore
          retention-days: 7

  # =========================================================================
  # 3. ESP32 integration test — full pipeline + local mosquitto in QEMU.
  # =========================================================================
  esp-integration:
    name: 🔗 ESP32 integration test (QEMU + mosquitto)
    needs: host-unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Check out
        uses: actions/checkout@v4

      - name: 🛠️ Install ESP-IDF v5.2
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2
          target: esp32

      - name: Start mosquitto broker
        run: |
          docker rm -f mosquitto 2>/dev/null || true
          docker run -d --name mosquitto -p 1883:1883 eclipse-mosquitto:2
          for i in $(seq 1 15); do
            if docker exec mosquitto mosquitto_sub -t '$$SYS/#' -C 1 -W 2 >/tmp/mosquitto_health.log 2>&1; then
              break
            fi
            sleep 2
          done
          docker ps --filter name=mosquitto

      - name: Install QEMU + MQTT client
        run: sudo apt-get install -y -qq qemu-system-xtensa mosquitto-clients

      - name: 🧹 Reset component lockfile
        run: rm -f dependencies.lock

      - name: 🏗️ Build integration test
        working-directory: tests/integration
        run: idf.py build

      - name: 🐛 Subscribe to test topic (background)
        run: |
          nohup mosquitto_sub -h localhost -p 1883 \
            -t 'sensors/motion/integration-test' \
            -C 1 -W 60 > /tmp/mqtt_sub.log 2>&1 &
          echo $! > /tmp/mqtt_sub.pid
          sleep 2

      - name: ▶️ Run integration test (QEMU)
        working-directory: tests/integration
        run: |
          timeout 90 qemu-system-xtensa \
            -nographic \
            -machine esp32 \
            -drive file=build/sensor_access_integration_test.bin,if=mtd,format=raw \
            || true

      - name: 🧹 Stop subscriber
        if: always()
        run: |
          if [ -f /tmp/mqtt_sub.pid ]; then
            kill "$(cat /tmp/mqtt_sub.pid)" 2>/dev/null || true
          fi

      - name: 🧹 Stop mosquitto broker
        if: always()
        run: docker rm -f mosquitto 2>/dev/null || true

      - name: 📤 Upload integration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: esp-integration-logs
          path: |
            tests/integration/build/*.log
            /tmp/mqtt_sub.log
          if-no-files-found: ignore
          retention-days: 7
