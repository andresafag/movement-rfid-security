name: Tests

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  host-unit:
    name: 🧪 Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 16
    steps:
      # -------------------------------------------------
      # 0️⃣ Checkout
      # -------------------------------------------------
      - name: 📥 Check out
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # -------------------------------------------------
      # 6️⃣ Run tests
      # -------------------------------------------------
      - name: Build ESP-IDF Project
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: 'v5.2'      
          target: 'esp32'             #
          path: '.'                   

      # -------------------------------------------------
      # 7️⃣ Upload logs
      # -------------------------------------------------
      - name: 📤 Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-unit-logs
          path: ./**/*.log
          if-no-files-found: ignore
          retention-days: 7


  # =========================================================================
  # 2. ESP-IDF component tests — real RTOS + GPIO driver in QEMU.
  # =========================================================================
  esp-component:
    name: 🧪 ESP-IDF component tests (QEMU)
    needs: host-unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Check out
        uses: actions/checkout@v4

      - name: 🛠️ Install ESP-IDF v5.2
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2
          target: esp32

      - name: 📦 Install QEMU
        run: sudo apt-get install -y -qq qemu-system-xtensa

      - name: 🧹 Reset component lockfile
        run: rm -f dependencies.lock

      - name: 🏗️ Build component test
        working-directory: tests/component/movement_driver
        run: idf.py build

      - name: ▶️ Run component test (QEMU)
        working-directory: tests/component/movement_driver
        run: |
          timeout 120 qemu-system-xtensa \
            -nographic \
            -machine esp32 \
            -drive file=build/movement_driver_component_test.bin,if=mtd,format=raw \
            || true

      - name: 📤 Upload component test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: esp-component-logs
          path: tests/component/movement_driver/build/*.log
          if-no-files-found: ignore
          retention-days: 7

  # =========================================================================
  # 3. ESP32 integration test — full pipeline + local mosquitto in QEMU.
  # =========================================================================
  esp-integration:
    name: 🔗 ESP32 integration test (QEMU + mosquitto)
    needs: host-unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Check out
        uses: actions/checkout@v4

      - name: 🛠️ Install ESP-IDF v5.2
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2
          target: esp32

      - name: Start mosquitto broker
        run: |
          docker rm -f mosquitto 2>/dev/null || true
          docker run -d --name mosquitto -p 1883:1883 eclipse-mosquitto:2
          for i in $(seq 1 15); do
            if docker exec mosquitto mosquitto_sub -t '$$SYS/#' -C 1 -W 2 >/tmp/mosquitto_health.log 2>&1; then
              break
            fi
            sleep 2
          done
          docker ps --filter name=mosquitto

      - name: Install QEMU + MQTT client
        run: sudo apt-get install -y -qq qemu-system-xtensa mosquitto-clients

      - name: 🧹 Reset component lockfile
        run: rm -f dependencies.lock

      - name: 🏗️ Build integration test
        working-directory: tests/integration
        run: idf.py build

      - name: 🐛 Subscribe to test topic (background)
        run: |
          nohup mosquitto_sub -h localhost -p 1883 \
            -t 'sensors/motion/integration-test' \
            -C 1 -W 60 > /tmp/mqtt_sub.log 2>&1 &
          echo $! > /tmp/mqtt_sub.pid
          sleep 2

      - name: ▶️ Run integration test (QEMU)
        working-directory: tests/integration
        run: |
          timeout 90 qemu-system-xtensa \
            -nographic \
            -machine esp32 \
            -drive file=build/sensor_access_integration_test.bin,if=mtd,format=raw \
            || true

      - name: 🧹 Stop subscriber
        if: always()
        run: |
          if [ -f /tmp/mqtt_sub.pid ]; then
            kill "$(cat /tmp/mqtt_sub.pid)" 2>/dev/null || true
          fi

      - name: 🧹 Stop mosquitto broker
        if: always()
        run: docker rm -f mosquitto 2>/dev/null || true

      - name: 📤 Upload integration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: esp-integration-logs
          path: |
            tests/integration/build/*.log
            /tmp/mqtt_sub.log
          if-no-files-found: ignore
          retention-days: 7
